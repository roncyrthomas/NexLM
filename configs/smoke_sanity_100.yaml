# 100-step local sanity run on the laptop GPU.
# Purpose: verify the whole pipeline (data + model + trainer + bf16 + cuda) actually
# runs end-to-end and that loss decreases. ~5 min one-time data download + ~3 min train.
model:
  shape: smoke_30m

training:
  data: tinystories
  batch_size: 8       # smaller batch for 8GB VRAM
  grad_accum: 1
  max_steps: 100
  lr: 3.0e-4
  lr_schedule: cosine
  warmup_steps: 20
  weight_decay: 0.1
  grad_clip: 1.0
  bf16: true
  compile: false

eval:
  val_every: 50
  val_steps: 10
  save_every: 100
  target_val_loss: 1.0  # unreachable in 100 steps; we just want to see the curve

logging:
  wandb_project: frankenstein-smoke-sanity
  log_every: 10

output_dir: out/sanity_100
